post.findByParams=select p.id, p.title, case when length(p.text) > 128 then substr(p.text, 1, 128)||'...' else p.text end text, p.tags, p.likes_count, count(c.id) comments_count from blog.posts p left join blog.comments c on c.post_id = p.id where p.title ilike '%'||?||'%' and tags && ? group by p.id, p.title, p.text, p.tags, p.likes_count order by p.id desc
post.findById=select p.id, p.title, p.text, p.tags, p.likes_count, count(c.id) comments_count from blog.posts p left join blog.comments c on c.post_id = p.id where p.id = ? group by p.id, p.title, p.text, p.tags, p.likes_count
post.save=insert into blog.posts (title, text, tags) values (?, ?, ?)
post.update=update blog.posts set title = ?, text = ?, tags = ? where id = ?
post.deleteById=delete from blog.posts where id = ?
post.incLikesCount=update blog.posts set likes_count = ? where id = ?
post.updateImage=update blog.posts set image = ? where id = ?
post.findImageById=select p.image from blog.posts p where p.id = ?